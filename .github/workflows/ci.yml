name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---- Build the native CLI binary across platforms (parity with turbo-dom's matrix) ----
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # `optional` legs never block the publish — assembly just ships without that
    # binary. musl is optional because turbo-test statically links V8 (rusty_v8),
    # whose prebuilts are glibc-only, so a musl link may fail. turbo-dom can build
    # musl as a hard leg (pure Rust, no V8); we can't guarantee it, so best-effort.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   binname: turbo-test-linux-x64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  binname: turbo-test-linux-x64-musl, optional: true }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,  binname: turbo-test-linux-arm64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,       binname: turbo-test-darwin-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     binname: turbo-test-win32-x64.exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux musl deps
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin turbo-test --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p bin
          ext=""; [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          cp "target/${{ matrix.target }}/release/turbo-test$ext" "bin/${{ matrix.binname }}"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: bin/turbo-test-*
          if-no-files-found: error

  # ---- Publish to npm on a version tag ----
  # One package containing every platform binary; cli.js picks the matching one at runtime
  # (linux x64 also detects musl vs glibc). Requires repo secret NPM_TOKEN (a Classic
  # Automation token allowed to publish the package).
  publish:
    name: publish
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: artifacts
      - name: Assemble bin/
        run: |
          mkdir -p bin
          find artifacts -type f -name 'turbo-test-*' -exec cp {} bin/ \;
          chmod +x bin/* || true
          ls -la bin/
      - name: Publish (skips prepublishOnly — binaries already built)
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
