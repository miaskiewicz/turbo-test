name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  # ---- Build the native CLI binary across platforms ----
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  node_plat: linux,  node_arch: x64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, node_plat: linux,  node_arch: arm64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,      node_plat: darwin, node_arch: arm64 }
          - { os: macos-13,       target: x86_64-apple-darwin,       node_plat: darwin, node_arch: x64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    node_plat: win32,  node_arch: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --bin turbo-test --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p bin
          ext=""; [ "${{ matrix.node_plat }}" = "win32" ] && ext=".exe"
          src="target/${{ matrix.target }}/release/turbo-test$ext"
          cp "$src" "bin/turbo-test-${{ matrix.node_plat }}-${{ matrix.node_arch }}$ext"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: bin/turbo-test-*

  # ---- Publish to npm on a version tag ----
  # One package containing every platform binary; cli.js picks the matching one at runtime.
  # Requires repo secret NPM_TOKEN (a Classic Automation token that can publish the package).
  publish:
    name: publish
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: artifacts
      - name: Assemble bin/
        run: |
          mkdir -p bin
          find artifacts -type f -name 'turbo-test-*' -exec cp {} bin/ \;
          chmod +x bin/* || true
          ls -la bin/
      - name: Publish (skips prepublishOnly — binaries already built)
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
